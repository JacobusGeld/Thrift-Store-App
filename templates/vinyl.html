<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vinyl Search</title>

    <!-- 🔥 Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: white;
        }

        .search-box {
            max-width: 500px;
            margin: auto;
        }

        .card {
            background-color: #1e1e1e;
            border: none;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card-title {
            font-size: 0.9rem;
            margin-top: 8px;
            text-align: center;
            color: #ddd;
        }

        .card img {
    image-rendering: auto;
    backface-visibility: hidden;
}
    </style>
</head>
<body>

<div class="container py-5">

    <!-- 🔍 Header -->
    <div class="text-center mb-4">
        <h1>🎵 Vinyl Finder</h1>
    </div>

    <!-- 🔍 Search -->
    <form method="POST" class="search-box mb-4">
        <div class="input-group">
            <input type="text" name="search" class="form-control" placeholder="Search artist or album..." required>
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <!-- 🎯 Results Grid -->
    <div class="row row-cols-2 row-cols-md-4 g-4">
        {% for item in results %}
        <div class="col">
                <a href="/release/{{ item.id }}" class="text-decoration-none">

                    <div class="card p-2 shadow-sm">

                        <img src="{{ item.thumb }}" class="img-fluid">

                        <div class="card-title">
                            {{ item.title }}
                        </div>

                    </div>

                </a>
            </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
